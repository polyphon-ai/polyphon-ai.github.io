name: Update Download Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable app version (semver, e.g. 0.11.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  update:
    name: Update downloadVersion and create release post
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "Error: '$VERSION' looks like a pre-release version. Only stable versions should be published."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Fetch release notes from polyphon repo
        run: |
          NOTES="$(gh release view "v${VERSION}" --repo polyphon-ai/polyphon --json body --jq '.body')"
          # Write to a temp file to safely handle multiline content
          printf '%s' "$NOTES" > /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update downloadVersion in hugo.yaml
        run: |
          sed -i "s/downloadVersion: .*/downloadVersion: \"${VERSION}\"/" hugo.yaml

      - name: Create release blog post
        run: |
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SLUG="polyphon-v${VERSION}-released"
          POST_DIR="content/blog/${SLUG}"
          mkdir -p "$POST_DIR"

          NOTES="$(cat /tmp/release-notes.md)"

          cat > "$POST_DIR/index.md" <<EOF
          ---
          title: "Polyphon v${VERSION} Released"
          description: "Polyphon v${VERSION} is now available for download."
          date: "${DATE}"
          draft: false
          tags: ["release", "announcement"]
          categories: ["Announcements"]
          ---

          ${NOTES}

          [Download the latest release](https://polyphon.ai/#download)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hugo.yaml content/blog/
          git diff --cached --quiet || git commit -m "chore(release): update site to v${VERSION}"
          git push

      - name: Trigger site deploy
        run: gh workflow run deploy-site.yml --repo polyphon-ai/polyphon-ai.github.io --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
