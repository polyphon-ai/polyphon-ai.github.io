<header data-pagefind-ignore class="site-header" role="banner">
  <div class="container">
    <a class="site-logo" href="/" aria-label="Polyphon — home">
      <img src="/brand/wordmark-light.svg" alt="Polyphon" class="site-wordmark wordmark-light" height="28" />
      <img src="/brand/wordmark-dark.svg" alt="" aria-hidden="true" class="site-wordmark wordmark-dark" height="28" />
    </a>

    <nav class="site-nav" aria-label="Main">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if $.IsHome }}{{ else }}{{ if eq $.RelPermalink .URL }} aria-current="page"{{ end }}{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
      <span class="icon-sun">{{ partial "icon.html" (dict "name" "sun" "size" 16) }}</span>
      <span class="icon-moon">{{ partial "icon.html" (dict "name" "moon" "size" 16) }}</span>
    </button>

    <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-nav" type="button">
      {{ partial "icon.html" (dict "name" "menu" "size" 18) }}
    </button>
  </div>
</header>

<div class="mobile-nav" id="mobile-nav" role="dialog" aria-modal="true" aria-label="Navigation menu">
  <div class="mobile-nav-backdrop" id="mobile-nav-backdrop"></div>
  <div class="mobile-nav-drawer" id="mobile-nav-drawer">
    <div class="mobile-nav-header">
      <span class="site-logo">
        <img src="/brand/wordmark-light.svg" alt="Polyphon" class="site-wordmark wordmark-light" height="22" />
        <img src="/brand/wordmark-dark.svg" alt="" aria-hidden="true" class="site-wordmark wordmark-dark" height="22" />
      </span>
      <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close navigation menu" type="button">
        {{ partial "icon.html" (dict "name" "x" "size" 16) }}
      </button>
    </div>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} aria-current="page"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </div>
</div>

<script>
(function() {
  var toggle = document.getElementById('theme-toggle');
  var hamburger = document.getElementById('hamburger');
  var mobileNav = document.getElementById('mobile-nav');
  var mobileNavClose = document.getElementById('mobile-nav-close');
  var backdrop = document.getElementById('mobile-nav-backdrop');
  var drawer = document.getElementById('mobile-nav-drawer');

  toggle.addEventListener('click', function() {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  function openMenu() {
    mobileNav.classList.add('open');
    hamburger.setAttribute('aria-expanded', 'true');
    mobileNavClose.focus();
    document.addEventListener('keydown', handleEscape);
    trapFocus(drawer);
  }

  function closeMenu() {
    mobileNav.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false');
    hamburger.focus();
    document.removeEventListener('keydown', handleEscape);
    removeTrap();
  }

  function handleEscape(e) {
    if (e.key === 'Escape') closeMenu();
  }

  var focusTrapCleanup = null;

  function trapFocus(el) {
    var focusable = el.querySelectorAll('a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])');
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    function onKey(e) {
      if (e.key !== 'Tab') return;
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }
    el.addEventListener('keydown', onKey);
    focusTrapCleanup = function() { el.removeEventListener('keydown', onKey); };
  }

  function removeTrap() {
    if (focusTrapCleanup) { focusTrapCleanup(); focusTrapCleanup = null; }
  }

  hamburger.addEventListener('click', openMenu);
  mobileNavClose.addEventListener('click', closeMenu);
  backdrop.addEventListener('click', closeMenu);
})();
</script>
