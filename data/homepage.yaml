features:
  - icon: music
    title: Multiple voices, one conversation
    body: Add any combination of Claude, GPT-4, Gemini, or local CLI tools. Every voice sees the full history.
  - icon: layers
    title: Compositions
    body: Save a named set of voices as a composition, then launch new sessions from it instantly.
  - icon: sliders
    title: Reusable configuration
    body: Save tone presets and system prompt templates. Attach them to any voice in any composition — update once, applies to every new session that uses it.
  - icon: zap
    title: Broadcast & conductor modes
    body: Broadcast to all voices at once, or direct your message to a specific voice.
  - icon: folder-open
    title: File system tools
    body: API voices get host-brokered file tools — read, write, list — with optional sandboxing to the session working directory. CLI voices run as autonomous agents in the same directory.
  - icon: search
    title: Full text search
    body: Search every message across all sessions instantly. Global search finds anything; per-session Cmd+F highlights matches inline.
  - icon: server
    title: MCP Server
    body: Use Polyphon as a tool inside your agent workflows. Claude Code, Cursor, Codex CLI, and GitHub Copilot can list compositions, create sessions, and broadcast questions to your full ensemble — synchronously, over stdio.
  - icon: terminal
    title: API server & poly CLI
    body: Enable the built-in TCP API server to control Polyphon programmatically. The poly CLI lets you create sessions, run prompts, stream responses, and export transcripts — all from the terminal or a CI pipeline.
  - icon: shield
    title: Local-first, no telemetry
    body: Conversations and API keys stay on your machine. No account, no cloud sync.
